<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hotel Bom Pra Cachorro</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

  <div class="container">

    <div class="logo">
      <h2>🐾 HOTEL BOM <br> PRA CACHORRO</h2>
    </div>

    <h1 class="titulo">Planos</h1>

 
    <div class="card">

      <div class="dog">
        🐶
      </div>

      <div class="info">
        <h3>Bronze</h3>

        <p>com anúmios - Pequeno porte</p>

        <button class="btn">
          Selecionar
        </button>
      </div>

    </div>


    <div class="card">

      <div class="dog">
        🐩
      </div>

      <div class="info">
        <h3>Plata</h3>

        <p>Pequeno e médio porte</p>

        <button class="btn">
          Selecionar
        </button>
      </div>

    </div>

   
    <div class="card">

      <div class="dog">
        🐶
      </div>

      <div class="info">
        <h3>Uuso</h3>

        <p>Sem anfíicos - Todos os portes</p>

        <button class="btn">
          Selecionar
        </button>
      </div>

    </div>

    <div class="dogs-footer">
      🐕 🐶 🐕‍🦺 🐩
    </div>

  </div>


  <div class="menu">

    <div class="menu-item">
      <i class="fa-solid fa-house"></i>
      Quem somos
    </div>

    <div class="menu-item">
      <i class="fa-solid fa-magnifying-glass"></i>
      Contatos
    </div>

    <div class="menu-item">
      <i class="fa-regular fa-star"></i>
      Contatos
    </div>

    <div class="menu-item">
      <i class="fa-regular fa-square-plus"></i>
      Planos
    </div>

    <div class="menu-item">
      <i class="fa-solid fa-user"></i>
      Cadastro
    </div>

  </div>

</body>
</html>
