<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="home.css" rel="stylesheet">
</head>
<body>
    <div class="tela">
        
        <!-- Cabeçário -->
        <div class="cabeçario">

            <!-- Logo -->
            <div class="logo">
                <h1>Logo</h1>
            </div>

            <!-- Links e botão Login -->
            <div class="nav-links">
                <h1 class="sobre_nos"><a href="#" target="_blank">Sobre Nós</a></h1>
                <h1 class="contatos"><a href="#" target="_blank">Contatos</a></h1>
                <h1 class="planos"><a href="#" target="_blank">Planos</a></h1>
                <h1 class="cadastro"><a href="#" target="_blank">Cadastro</a></h1>
                <button type="button" id="login">Login</button>
            </div>

        </div>

        <!-- Área de conteúdo com duas colunas -->
        <div class="conteudo">
            
            <!-- Coluna de texto -->
            <div class="texto">
                <h2>Seu pet em boas mãos.</h2>

                <!-- Nova div para serviços -->
                <div class="servicos">
                    <h3>Nossos Serviços</h3>
                    <ul>
                        <li>Hospedagem</li>
                        <li>Banho e Tosa</li>
                        <li>Recreação</li>
                    </ul>
                </div>
            </div>

            <!-- Coluna de imagem -->
            <div class="imagem">
                <img src="imagem dos animais.png" alt="Imagem do pet">
            </div>

        </div>

    </div>
</body>
</html>
